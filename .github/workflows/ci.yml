name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - '**/*.md'
      - '.claude/**'
      - 'scripts/vercel-ignore.sh'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - '.claude/**'
      - 'scripts/vercel-ignore.sh'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, lint, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - name: Build (with first-load JS summary)
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log
      - name: Surface first-load JS per route
        if: always()
        run: |
          {
            echo "## First-load JS per route"
            echo ""
            echo "Captured from \`next build\` stdout. Watch for jumps when adding deps (Zod, three.js, GSAP, Phaser) — pre-fix, every static page loaded ~98 kB of Zod due to module-load \`Schema.parse\` calls."
            echo ""
            echo '```'
            awk '/^Route \(app\)/{flag=1} flag{print} /server-rendered on demand/{flag=0; exit}' build.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - run: npm run coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 14
